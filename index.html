    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class', // Enable class-based dark mode
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              'brand-primary': '#4ECDC4',
              'brand-secondary': '#AA96DA',
              'brand-accent': '#FF6B6B',
              'brand-yellow': '#FFE66D',
              'charcoal-900': '#121212',
              'charcoal-800': '#1E1E1E',
              'charcoal-700': '#2C2C2C',
              'mifeco-slate': '#0f172a',
            },
            typography: (theme) => ({
              DEFAULT: {
                css: {
                  '--tw-prose-body': theme('colors.gray[700]'),
                  '--tw-prose-headings': theme('colors.gray[900]'),
                  '--tw-prose-links': theme('colors.blue[600]'),
                  '--tw-prose-bold': theme('colors.gray[900]'),
                  '--tw-prose-counters': theme('colors.gray[500]'),
                  '--tw-prose-bullets': theme('colors.gray[300]'),
                  '--tw-prose-hr': theme('colors.gray[200]'),
                  '--tw-prose-quotes': theme('colors.gray[900]'),
                  '--tw-prose-quote-borders': theme('colors.gray[200]'),
                  '--tw-prose-captions': theme('colors.gray[500]'),
                  '--tw-prose-code': theme('colors.gray[900]'),
                  '--tw-prose-pre-code': theme('colors.gray[200]'),
                  '--tw-prose-pre-bg': theme('colors.gray[800]'),
                  '--tw-prose-th-borders': theme('colors.gray[300]'),
                  '--tw-prose-td-borders': theme('colors.gray[200]'),
                  '--tw-prose-invert-body': theme('colors.gray[300]'),
                  '--tw-prose-invert-headings': theme('colors.white'),
                  '--tw-prose-invert-links': theme('colors.brand-primary'),
                  '--tw-prose-invert-bold': theme('colors.white'),
                  '--tw-prose-invert-counters': theme('colors.gray[400]'),
                  '--tw-prose-invert-bullets': theme('colors.gray[600]'),
                  '--tw-prose-invert-hr': theme('colors.charcoal-700'),
                  '--tw-prose-invert-quotes': theme('colors.gray[100]'),
                  '--tw-prose-invert-quote-borders': theme('colors.charcoal-700'),
                  '--tw-prose-invert-captions': theme('colors.gray[400]'),
                  '--tw-prose-invert-pre-code': theme('colors.gray[300]'),
                  '--tw-prose-invert-pre-bg': 'rgb(0 0 0 / 50%)',
                  '--tw-prose-invert-th-borders': theme('colors.gray[600]'),
                  '--tw-prose-invert-td-borders': theme('colors.charcoal-700'),
                },
              },
            }),
          },
        },
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
      .slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        background: #fff;
        border: 2px solid #4ECDC4;
        border-radius: 50%;
        cursor: pointer;
      }
      .slider::-moz-range-thumb {
        width: 16px;
        height: 16px;
        background: #fff;
        border: 2px solid #4ECDC4;
        border-radius: 50%;
        cursor: pointer;
      }
       /* Custom scrollbar styles */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background-color: #4b5563; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background-color: #6b7280; }
    </style>
     <script>
      // Flicker-prevention and default theme script
      (function() {
        let theme = localStorage.getItem('theme');
        if (!theme) {
            theme = 'dark'; // Default to dark mode
            localStorage.setItem('theme', 'dark');
        }
        if (theme === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
      })();
    </script>
